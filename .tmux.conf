set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

unbind C-b
set -g prefix C-space 
bind C-space send-prefix

unbind %
unbind '"'

bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g base-index 1
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom 
set -g detach-on-destroy off
set -g mode-keys vi

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'Alkindi42/tmux-bitwarden'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Bauhaus palette (pre-set so catppuccin's -ogq skips its defaults)
set -g @thm_bg "#101318"
set -g @thm_fg "#EAEFF5"
set -g @thm_rosewater "#EAEFF5"
set -g @thm_flamingo "#E37B66"
set -g @thm_pink "#C6CED8"
set -g @thm_mauve "#E37B66"
set -g @thm_red "#C0704F"
set -g @thm_maroon "#CB886D"
set -g @thm_peach "#E0A568"
set -g @thm_yellow "#E7A46F"
set -g @thm_green "#789FA2"
set -g @thm_teal "#809D9E"
set -g @thm_sky "#759496"
set -g @thm_sapphire "#6F8A8C"
set -g @thm_blue "#8999AA"
set -g @thm_lavender "#98A0AE"
set -g @thm_subtext_1 "#98A0AE"
set -g @thm_subtext_0 "#C6CED8"
set -g @thm_overlay_2 "#3A3F4C"
set -g @thm_overlay_1 "#2B3040"
set -g @thm_overlay_0 "#2B3040"
set -g @thm_surface_2 "#2B3040"
set -g @thm_surface_1 "#222733"
set -g @thm_surface_0 "#161B22"
set -g @thm_mantle "#101318"
set -g @thm_crust "#0C0F14"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_battery}"

run '~/.tmux/plugins/tpm/tpm'
